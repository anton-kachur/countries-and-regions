<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Страны и регионы — пошаговая игра</title>
  <style>
    :root {
      --bg: #f3f3f3;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --orange: #f97316;
      --green: #16a34a;
      --accent: #2563eb;
    }

    * {
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      margin: 0;
      color: var(--text);
      background: var(--bg);
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .app {
      display: grid;
      grid-template-columns: 560px 360px;
      gap: 16px;
      max-width: 960px;
      width: 100%;
    }

    .map-wrap,
    .panel {
      background: var(--panel);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      overflow: auto;
    }

    .map-wrap {
      padding: 10px;
    }

    .map {
      position: relative;
      width: 540px;
      height: 660px;
      margin: 0 auto;
      background-color: #e8e8e8;
      border-radius: 10px;
      border: 1px solid #ddd;
      overflow: hidden;
    }

    .zoom-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .zoom-row input[type="range"] {
      flex: 1;
    }

    .map-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      pointer-events: none;
    }

    .borders {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: auto;
      display: block;
      z-index: 1;
    }

    .country-border {
      fill: none;
      stroke: #000;
      stroke-width: 6;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .region-border {
      fill: none;
      stroke: #000;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .regions-layer {
      pointer-events: auto;
    }

    .region-shape {
      stroke-width: 2;
      stroke-linejoin: round;
      cursor: pointer;
      transition: fill 0.12s ease, stroke 0.12s ease, stroke-width 0.12s ease;
    }

    .region-shape.selected {
      stroke: #2563eb;
      stroke-width: 5;
    }

    .internal-boundary {
      stroke: #000;
      stroke-width: 3;
      stroke-linecap: round;
      pointer-events: none;
    }

    .region-btn {
      position: absolute;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid #111;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      z-index: 5;
    }

    .region-btn.selected {
      outline: 4px solid var(--accent);
      z-index: 2;
    }

    .region-btn.capital::after {
      content: "";
    }

    .capital-star {
      position: absolute;
      transform: translate(-50%, -50%);
      font-size: 20px;
      color: #111;
      text-shadow: 0 1px 1px rgba(255, 255, 255, 0.9);
      z-index: 10;
      pointer-events: none;
    }

    .reinforcement-token {
      position: absolute;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 3px solid #111;
      background: #facc15;
      color: #111;
      font-weight: 800;
      display: none;
      align-items: center;
      justify-content: center;
      transform: translate(-50%, -50%);
      z-index: 20;
      cursor: grab;
      user-select: none;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
    }

    .reinforcement-token.dragging {
      cursor: grabbing;
    }

    .panel {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
    }

    .muted {
      color: var(--muted);
      font-size: 14px;
      margin: 0;
    }

    .status {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px;
      background: #fafafa;
    }

    .status p {
      margin: 6px 0;
      font-size: 14px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px 8px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-danger {
      background: #ef4444;
      color: #fff;
    }

    .btn-success {
      background: #10b981;
      color: #fff;
    }

    .log {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      height: 280px;
      overflow: auto;
      padding: 8px;
      background: #fff;
      font-size: 13px;
    }

    .log p {
      margin: 6px 0;
      line-height: 1.35;
    }

    .pass-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.45);
      z-index: 30;
    }

    .pass-overlay.show {
      display: flex;
    }

    .pass-card {
      width: min(420px, 92vw);
      background: #fff;
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    .pass-card h2 {
      margin: 0 0 8px;
    }

    .pass-card p {
      margin: 0 0 14px;
      color: var(--muted);
    }
  </style>
</head>

  <div class="app">
    <div class="map-wrap">
      <div class="map" id="map">
        <img id="mapBg" class="map-bg" alt="Карта" />
        <svg class="borders" viewBox="0 0 540 660" aria-hidden="true" id="mapSvg">
          <g id="regionsLayer" class="regions-layer"></g>
          <g id="boundariesLayer"></g>
        </svg>
        <div id="reinforcementToken" class="reinforcement-token">+0</div>
      </div>
    </div>
    <div class="panel">
      <h1>Страны и регионы</h1>
      <p class="muted">by @vennerkurh 2026</p>

      <div class="status">
        <p><strong>Текущий ход:</strong> <span id="turnText"></span></p>
        <p><strong>Режим:</strong> <span id="modeText"></span></p>
        <p><strong>Статус:</strong> <span id="warText"></span></p>
      </div>

      <div class="controls">
        <button id="moveModeBtn" class="btn-secondary">Режим: Перемещение</button>
        <button id="attackModeBtn" class="btn-danger">Режим: Атака</button>

        <button id="warBtn" class="btn-danger">Объявить войну</button>
      </div>

      <button id="endTurnBtn" class="btn-primary">Закончить ход</button>
      <button id="restartBtn" class="btn-secondary">Перезапуск игры</button>

      <div class="status">
        <p><strong>Игровые карты</strong></p>
        <div class="controls">
          <select id="mapSelect" style="padding:10px;border-radius:8px;border:1px solid #d1d5db;">
            <option value="default">2 countries</option>
          </select>
          <button id="loadMapBtn" class="btn-secondary">Загрузить карту</button>
        </div>
        <div class="zoom-row">
          <label for="zoomRange"><strong>Масштаб:</strong></label>
          <input id="zoomRange" type="range" min="70" max="170" step="5" value="100" />
          <span id="zoomText">100%</span>
        </div>
      </div>
      <div class="log" id="log"></div>
    </div>
  </div>
  <div id="passOverlay" class="pass-overlay" role="dialog" aria-modal="true">
    <div class="pass-card">
      <h2 id="passTitle">Передайте ход</h2>

      <button id="startTurnBtn" class="btn-primary">Начать ход</button>
    </div>
  </div>

    const COUNTRY_LIBRARY = {

      cyan2: { id: "cyan2", name: "Голубая уния II", color: "#38bdf8" },
      cyan3: { id: "cyan3", name: "Голубая уния III", color: "#38bdf8" },
      black: { id: "black", name: "Черная страна", color: "#111827" },
      darkgray: { id: "darkgray", name: "Темно-серая страна", color: "#4b5563" },
      yellow: { id: "yellow", name: "Желтая страна", color: "#facc15" },
      purple: { id: "purple", name: "Фиолетовая страна", color: "#a855f7" },

    };

    function withAlpha(hex, alpha) {
      const clean = hex.replace("#", "");
      const full = clean.length === 3 ? clean.split("").map((c) => c + c).join("") : clean;
      const r = parseInt(full.slice(0, 2), 16);
      const g = parseInt(full.slice(2, 4), 16);
      const b = parseInt(full.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function signedDistanceToBisector(point, a, b) {
      const mx = (a.x + b.x) / 2;
      const my = (a.y + b.y) / 2;
      const nx = b.x - a.x;
      const ny = b.y - a.y;
      return (point.x - mx) * nx + (point.y - my) * ny;
    }

    function clipPolygonByBisector(poly, a, b) {
      if (!poly.length) return [];
      const result = [];
      const eps = 1e-6;
      for (let i = 0; i < poly.length; i += 1) {
        const cur = poly[i];
        const next = poly[(i + 1) % poly.length];
        const d1 = signedDistanceToBisector(cur, a, b);
        const d2 = signedDistanceToBisector(next, a, b);
        const inside1 = d1 <= eps;
        const inside2 = d2 <= eps;
        if (inside1 && inside2) {
          result.push(next);
        } else if (inside1 && !inside2) {
          const t = d1 / (d1 - d2);
          result.push({ x: cur.x + (next.x - cur.x) * t, y: cur.y + (next.y - cur.y) * t });
        } else if (!inside1 && inside2) {
          const t = d1 / (d1 - d2);
          result.push({ x: cur.x + (next.x - cur.x) * t, y: cur.y + (next.y - cur.y) * t });
          result.push(next);
        }
      }
      return result;
    }

    function dedupePolygon(poly) {
      const out = [];
      for (const p of poly) {
        const prev = out[out.length - 1];
        if (!prev || Math.hypot(prev.x - p.x, prev.y - p.y) > 0.8) out.push(p);
      }
      if (out.length > 2) {
        const first = out[0];
        const last = out[out.length - 1];
        if (Math.hypot(first.x - last.x, first.y - last.y) < 0.8) out.pop();
      }
      return out;
    }

    function polygonAreaByPoints(pts) {
      if (!pts || pts.length < 3) return 0;
      let area = 0;
      for (let i = 0; i < pts.length; i += 1) {
        const a = pts[i];
        const b = pts[(i + 1) % pts.length];
        area += a.x * b.y - b.x * a.y;
      }
      return Math.abs(area) / 2;
    }

    function regularPolygonAround(x, y, radius, sides = 8) {
      const pts = [];
      for (let i = 0; i < sides; i += 1) {
        const angle = (Math.PI * 2 * i) / sides - Math.PI / 2;
        pts.push({ x: x + Math.cos(angle) * radius, y: y + Math.sin(angle) * radius });
      }
      return pts;
    }

    function buildVoronoiGeometry(regionData, outline, minCellArea = 300) {
      const outlinePoly = outline.map(([x, y]) => ({ x, y }));
      const siteById = new Map(regionData.map((r) => [r.id, { x: r.x, y: r.y }]));
      const cellById = {};

      for (const region of regionData) {
        let cell = [...outlinePoly];
        const a = siteById.get(region.id);
        for (const other of regionData) {
          if (other.id === region.id) continue;
          const b = siteById.get(other.id);
          cell = clipPolygonByBisector(cell, a, b);
          if (!cell.length) break;
        }
        let deduped = dedupePolygon(cell);
        if (deduped.length < 3 || polygonAreaByPoints(deduped) < minCellArea) {
          deduped = dedupePolygon(regularPolygonAround(a.x, a.y, 24, 10));
        }
        cellById[region.id] = deduped;
      }

      const regionVertices = {};
      const regionShapes = {};
      const vertexKeyToId = new Map();
      let vertexCounter = 0;
      const quant = (n) => Math.round(n * 2) / 2;

      function ensureVertexId(pt) {
        const key = `${quant(pt.x)}|${quant(pt.y)}`;
        if (!vertexKeyToId.has(key)) {
          vertexCounter += 1;
          const id = `V${vertexCounter}`;
          vertexKeyToId.set(key, id);
          regionVertices[id] = [quant(pt.x), quant(pt.y)];
        }
        return vertexKeyToId.get(key);
      }

      for (const region of regionData) {
        const cell = cellById[region.id];
        regionShapes[region.id] = cell.map((pt) => ensureVertexId(pt));
      }

      const edgeToRegions = new Map();
      for (const region of regionData) {
        const verts = regionShapes[region.id];
        for (let i = 0; i < verts.length; i += 1) {
          const a = verts[i];
          const b = verts[(i + 1) % verts.length];
          const key = a < b ? `${a}|${b}` : `${b}|${a}`;
          if (!edgeToRegions.has(key)) edgeToRegions.set(key, []);
          edgeToRegions.get(key).push(region.id);
        }
      }

      const neighbors = Object.fromEntries(regionData.map((r) => [r.id, []]));
      for (const regionIds of edgeToRegions.values()) {
        if (regionIds.length !== 2) continue;
        const [a, b] = regionIds;
        if (!neighbors[a].includes(b)) neighbors[a].push(b);
        if (!neighbors[b].includes(a)) neighbors[b].push(a);
      }

      return { neighbors, regionVertices, regionShapes };
    }

    function getRegion(id) {
      return regions.find((r) => r.id === id);
    }

    function getCountry(countryId) {
      return activeCountries[countryId];
    }

    function getAlivePlayers() {
      return new Set(regions.map((r) => r.owner));
    }

    function getAllianceOf(countryId) {
      for (const [allianceId, members] of Object.entries(activeAlliances || {})) {
        if (members.includes(countryId)) return allianceId;
      }
      return null;
    }

    function areAllies(countryA, countryB) {
      if (countryA === countryB) return true;
      const a = getAllianceOf(countryA);
      const b = getAllianceOf(countryB);
      return Boolean(a && b && a === b);
    }

    function switchPlayer() {
      const alive = getAlivePlayers();
      if (!alive.size) return;
      for (let step = 1; step <= turnOrder.length; step += 1) {
        const idx = (turnIndex + step) % turnOrder.length;
        const candidate = turnOrder[idx];
        if (alive.has(candidate)) {
          turnIndex = idx;
          currentPlayer = candidate;
          return;
        }
      }
    }

    let neighbors = structuredClone(GAME_MAPS[activeMapId].neighbors);
    let regionVertices = structuredClone(GAME_MAPS[activeMapId].regionVertices);
    let regionShapes = structuredClone(GAME_MAPS[activeMapId].regionShapes);

    function verticesToPoints(vertexIds) {
      return vertexIds.map((id) => regionVertices[id].join(",")).join(" ");
    }

    function edgeKey(a, b) {
      return a < b ? `${a}|${b}` : `${b}|${a}`;
    }

    function pointInPolygon(x, y, vertexIds) {
      const pts = vertexIds.map((id) => regionVertices[id]);
      let inside = false;
      for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
        const xi = pts[i][0];
        const yi = pts[i][1];
        const xj = pts[j][0];
        const yj = pts[j][1];
        const intersects = yi > y !== yj > y && x < ((xj - xi) * (y - yi)) / (yj - yi) + xi;
        if (intersects) inside = !inside;
      }
      return inside;
    }

    function getRegionIdAtClientPoint(clientX, clientY) {
      reinforcementTokenEl.style.visibility = "hidden";
      const el = document.elementFromPoint(clientX, clientY);
      reinforcementTokenEl.style.visibility = "visible";
      if (!el) return null;
      if (el.classList && el.classList.contains("region-shape")) {
        return el.getAttribute("data-region-id");
      }
      if (el.classList && el.classList.contains("region-btn")) {
        return el.getAttribute("data-region-id");
      }
      return null;
    }

    function placeReinforcementTokenFromClient(clientX, clientY) {
      const rect = mapEl.getBoundingClientRect();
      const x = Math.max(30, Math.min(rect.width - 30, clientX - rect.left));
      const y = Math.max(30, Math.min(rect.height - 30, clientY - rect.top));
      reinforcementTokenEl.style.left = `${x}px`;
      reinforcementTokenEl.style.top = `${y}px`;
    }

    function polygonCentroid(vertexIds) {
      const pts = vertexIds.map((id) => regionVertices[id]);
      let twiceArea = 0;
      let cx = 0;
      let cy = 0;

      for (let i = 0; i < pts.length; i += 1) {
        const [x1, y1] = pts[i];
        const [x2, y2] = pts[(i + 1) % pts.length];
        const cross = x1 * y2 - x2 * y1;
        twiceArea += cross;
        cx += (x1 + x2) * cross;
        cy += (y1 + y2) * cross;
      }

      if (twiceArea === 0) {
        const sx = pts.reduce((sum, p) => sum + p[0], 0);
        const sy = pts.reduce((sum, p) => sum + p[1], 0);
        return { x: sx / pts.length, y: sy / pts.length };
      }

      return {
        x: cx / (3 * twiceArea),
        y: cy / (3 * twiceArea)
      };
    }

    function findSafePointInsideRegion(vertexIds, seedX, seedY) {
      if (pointInPolygon(seedX, seedY, vertexIds)) return { x: seedX, y: seedY };
      const angles = [0, 45, 90, 135, 180, 225, 270, 315];
      for (let radius = 6; radius <= 60; radius += 6) {
        for (const angle of angles) {
          const rad = (angle * Math.PI) / 180;
          const x = seedX + Math.cos(rad) * radius;
          const y = seedY + Math.sin(rad) * radius;
          if (pointInPolygon(x, y, vertexIds)) return { x, y };
        }
      }
      const pts = vertexIds.map((id) => regionVertices[id]);
      const sx = pts.reduce((sum, p) => sum + p[0], 0);
      const sy = pts.reduce((sum, p) => sum + p[1], 0);
      return { x: sx / pts.length, y: sy / pts.length };
    }

    function renderStatus() {
      turnText.textContent = getCountry(currentPlayer).name;
      modeText.textContent = mode === "move" ? "Перемещение" : "Атака";
      warText.textContent = atWar ? "Война" : "Перемирие";
    }

    function loadMap(mapId) {
      const mapDef = GAME_MAPS[mapId];
      if (!mapDef) return;

      activeMapId = mapId;
      mapSelectEl.value = mapId;
      activeCountries = structuredClone(mapDef.countries);
      turnOrder = [...mapDef.countryOrder];
      activeAlliances = structuredClone(mapDef.alliances || {});
      turnIndex = 0;
      neighbors = structuredClone(mapDef.neighbors);
      regionVertices = structuredClone(mapDef.regionVertices);
      regionShapes = structuredClone(mapDef.regionShapes);
      regions = structuredClone(mapDef.regionData);

      const alive = getAlivePlayers();
      while (turnIndex < turnOrder.length && !alive.has(turnOrder[turnIndex])) {
        turnIndex += 1;
      }
      currentPlayer = turnOrder[turnIndex] || turnOrder[0];
      mode = "move";
      atWar = true;
      selectedRegionId = null;
      winner = null;
      isPassPhase = false;
      playersWhoFinishedAtLeastOneTurn.clear();
      blockedMoveSources = new Set();
      pendingReinforcement = null;
      reinforcementDrag = false;
      reinforcementTokenEl.style.display = "none";
      reinforcementTokenEl.classList.remove("dragging");
      passOverlayEl.classList.remove("show");
      logEl.innerHTML = "";
      mapBgEl.style.display = "none";
      mapBgEl.style.opacity = "0";
      addLog(`Загружена карта: ${mapDef.name}.`);
      addLog("Игра началась. Выберите режим, затем регион.");
      render();
    }

    function renderMap() {
      for (const old of mapEl.querySelectorAll(".region-btn")) {
        old.remove();
      }
      for (const old of mapEl.querySelectorAll(".capital-star")) {
        old.remove();
      }

      regionsLayerEl.innerHTML = "";
      boundariesLayerEl.innerHTML = "";
      const edgeUsage = new Map();
      const regionById = new Map(regions.map((r) => [r.id, r]));

      for (const region of regions) {
        const vertices = regionShapes[region.id];
        if (!vertices || vertices.length < 3) continue;
        const polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
        polygon.setAttribute("points", verticesToPoints(vertices));
        polygon.setAttribute("class", `region-shape${selectedRegionId === region.id ? " selected" : ""}`);
        const regionColor = getCountry(region.owner).color;
        polygon.style.fill = withAlpha(regionColor, selectedRegionId === region.id ? 0.34 : 0.2);
        polygon.style.stroke = withAlpha(regionColor, selectedRegionId === region.id ? 0.34 : 0.2);
        polygon.setAttribute("data-region-id", region.id);
        polygon.addEventListener("click", () => onRegionClick(region.id));
        regionsLayerEl.appendChild(polygon);

        for (let i = 0; i < vertices.length; i += 1) {
          const a = vertices[i];
          const b = vertices[(i + 1) % vertices.length];
          const key = edgeKey(a, b);
          if (!edgeUsage.has(key)) {
            edgeUsage.set(key, { a, b, regionIds: new Set() });
          }
          edgeUsage.get(key).regionIds.add(region.id);
        }
      }

      for (const entry of edgeUsage.values()) {
        const owners = [...entry.regionIds].map((id) => regionById.get(id).owner);
        const distinctOwners = new Set(owners);
        const [x1, y1] = regionVertices[entry.a];
        const [x2, y2] = regionVertices[entry.b];
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", `${x1}`);
        line.setAttribute("y1", `${y1}`);
        line.setAttribute("x2", `${x2}`);
        line.setAttribute("y2", `${y2}`);
        if (entry.regionIds.size === 1 || distinctOwners.size > 1) {
          line.setAttribute("class", "country-border");
        } else {
          line.setAttribute("class", "internal-boundary");
        }
        boundariesLayerEl.appendChild(line);
      }

      for (const region of regions) {
        if (!regionShapes[region.id] || regionShapes[region.id].length < 3) continue;
        const btn = document.createElement("button");
        btn.className = "region-btn";
        if (region.capital) btn.classList.add("capital");
        if (selectedRegionId === region.id) btn.classList.add("selected");
        btn.style.background = getCountry(region.owner).color;
        const center = polygonCentroid(regionShapes[region.id]);
        const safeCenter = findSafePointInsideRegion(regionShapes[region.id], center.x, center.y);
        btn.style.left = `${safeCenter.x}px`;
        btn.style.top = `${safeCenter.y}px`;
        btn.textContent = region.army;
        btn.title = `${region.id} (${getCountry(region.owner).name})`;
        btn.setAttribute("data-region-id", region.id);
        btn.addEventListener("click", () => onRegionClick(region.id));
        mapEl.appendChild(btn);

        if (region.capital) {
          const offsets = [
            [34, -22],
            [-34, -22],
            [34, 22],
            [-34, 22],
            [0, -38],
            [0, 38]
          ];
          let sx = safeCenter.x;
          let sy = safeCenter.y;
          for (const [dx, dy] of offsets) {
            const tx = center.x + dx;
            const ty = center.y + dy;
            if (pointInPolygon(tx, ty, regionShapes[region.id])) {
              sx = tx;
              sy = ty;
              break;
            }
          }
          const safeStar = findSafePointInsideRegion(regionShapes[region.id], sx, sy);
          const star = document.createElement("div");
          star.className = "capital-star";
          star.textContent = "★";
          star.style.left = `${safeStar.x}px`;
          star.style.top = `${safeStar.y}px`;
          mapEl.appendChild(star);
        }
      }
    }

    function checkWinner() {
      if (activeAlliances && Object.keys(activeAlliances).length) {
        const alive = getAlivePlayers();
        const aliveAllianceIds = new Set(
          [...alive].map((countryId) => getAllianceOf(countryId)).filter(Boolean)
        );
        if (aliveAllianceIds.size === 1) {
          const allianceId = [...aliveAllianceIds][0];
          winner = allianceId;
          addLog(`Победа союза ${allianceId}! Все страны соперников устранены.`);
          alert(`Победил союз ${allianceId}!`);
          return;
        }
      }
      const owners = new Set(regions.map((r) => r.owner));
      if (owners.size === 1) {
        winner = [...owners][0];
        addLog(`Победа: ${getCountry(winner).name}! Все регионы захвачены.`);
        alert(`Победила ${getCountry(winner).name}!`);
      }
    }

    function doMove(from, to) {
      if (from.owner !== currentPlayer) return;
      if (!areAllies(from.owner, to.owner)) {
        addLog("Перемещать войска можно только в регион своей страны или союзника.");
        return;
      }
      if (from.id === to.id) return;
      if (!neighbors[from.id]?.includes(to.id)) {
        addLog("Перемещение возможно только в соседний регион.");
        return;
      }
      if (blockedMoveSources.has(from.id)) {
        addLog("Из этого региона в текущем ходу действовать нельзя (он уже был получателем войск).");
        return;
      }
      if (from.army <= 1) {
        addLog("Нельзя переместить армию: в регионе только 1 юнит.");
        return;
      }
      const maxMove = from.army - 1;
      const raw = prompt(`Сколько юнитов переместить? (1..${maxMove})`, "1");
      if (!raw) return;
      const m = Number(raw);
      if (!Number.isInteger(m) || m < 1 || m > maxMove) {
        addLog("Некорректное число перемещения.");
        return;
      }

      from.army -= m;
      to.army += m;
      blockedMoveSources.add(to.id);
      addLog(`${getCountry(currentPlayer).name}: перемещение ${m} юнитов из ${from.id} в ${to.id}.`);
    }

    function doAttack(from, to) {
      if (!atWar) {
        addLog("Атака запрещена: действует перемирие.");
        return;
      }
      if (from.owner !== currentPlayer || to.owner === currentPlayer) return;
      if (areAllies(from.owner, to.owner)) {
        addLog("Нельзя атаковать регион союзника.");
        return;
      }
      if (!neighbors[from.id]?.includes(to.id)) {
        addLog("Атака возможна только в соседний вражеский регион.");
        return;
      }
      if (blockedMoveSources.has(from.id)) {
        addLog("Из этого региона в текущем ходу атаковать нельзя (он уже получил войска).");
        return;
      }
      if (from.army <= 1) {
        addLog("Атака невозможна: в атакующем регионе только 1 юнит.");
        return;
      }
      const maxAttack = from.army - 1;
      const raw = prompt(`Сколько юнитов отправить в атаку? (1..${maxAttack})`, "1");
      if (!raw) return;
      const attackUnits = Number(raw);
      if (!Number.isInteger(attackUnits) || attackUnits < 1 || attackUnits > maxAttack) {
        addLog("Некорректное число атакующих юнитов.");
        return;
      }

      if (attackUnits > to.army) {
        const defenderArmy = to.army;
        const survivors = attackUnits - defenderArmy;
        from.army -= attackUnits;
        to.owner = currentPlayer;
        to.army = survivors;
        blockedMoveSources.add(to.id);
        addLog(
          `${getCountry(currentPlayer).name} захватывает ${to.id}. В атаку отправлено ${attackUnits}, выжило ${survivors}.`
        );
      } else {
        from.army -= attackUnits;
        to.army -= attackUnits;
        addLog(
          `${getCountry(currentPlayer).name} атакует ${to.id} из ${from.id}: обе стороны потеряли ${attackUnits}.`
        );
      }
    }

    function onRegionClick(id) {
      if (winner || isPassPhase || pendingReinforcement) return;

      const clicked = getRegion(id);
      if (!selectedRegionId) {
        if (clicked.owner !== currentPlayer) {
          addLog("Сначала выберите регион своей страны.");
          return;
        }
        selectedRegionId = id;
        render();
        return;
      }

      const selected = getRegion(selectedRegionId);
      if (mode === "move") {
        doMove(selected, clicked);
      } else {
        doAttack(selected, clicked);
      }

      selectedRegionId = null;
      checkWinner();
      render();
    }

    function render() {
      renderStatus();
      renderMap();
    }

    function showPassOverlay() {
      isPassPhase = true;
      passTitleEl.textContent = "Передайте ход";
      passTextEl.textContent = `Теперь ходит: ${getCountry(currentPlayer).name}. Передайте устройство игроку этой страны.`;
      passOverlayEl.classList.add("show");
    }

    function hidePassOverlay() {
      isPassPhase = false;
      passOverlayEl.classList.remove("show");
      applyReinforcementForCurrentPlayer();
      render();
    }

    function applyReinforcementForCurrentPlayer() {
      if (!playersWhoFinishedAtLeastOneTurn.has(currentPlayer)) return;
      const owned = regions.filter((r) => r.owner === currentPlayer);
      if (!owned.length) return;

      const reinforcements = owned.reduce((sum, region) => sum + (region.capital ? 2 : 1), 0);
      pendingReinforcement = { units: reinforcements };
      reinforcementTokenEl.textContent = `+${reinforcements}`;
      reinforcementTokenEl.style.display = "flex";
      reinforcementTokenEl.style.left = "270px";
      reinforcementTokenEl.style.top = "330px";
      addLog(`${getCountry(currentPlayer).name}: перетащите +${reinforcements} в один из своих регионов.`);
    }

    document.getElementById("moveModeBtn").addEventListener("click", () => {
      if (isPassPhase || pendingReinforcement) return;
      mode = "move";
      selectedRegionId = null;
      addLog("Выбран режим перемещения.");
      render();
    });

    document.getElementById("attackModeBtn").addEventListener("click", () => {
      if (isPassPhase || pendingReinforcement) return;
      mode = "attack";
      selectedRegionId = null;
      addLog("Выбран режим атаки.");
      render();
    });

    document.getElementById("truceBtn").addEventListener("click", () => {
      if (isPassPhase || pendingReinforcement) return;
      atWar = false;
      addLog(`${getCountry(currentPlayer).name} заключила перемирие.`);
      render();
    });

    document.getElementById("warBtn").addEventListener("click", () => {
      if (isPassPhase || pendingReinforcement) return;
      atWar = true;
      addLog(`${getCountry(currentPlayer).name} объявила войну.`);
      render();
    });

    document.getElementById("endTurnBtn").addEventListener("click", () => {
      if (winner || isPassPhase || pendingReinforcement) return;
      selectedRegionId = null;
      playersWhoFinishedAtLeastOneTurn.add(currentPlayer);
      switchPlayer();
      if (!getAlivePlayers().has(currentPlayer)) {
        checkWinner();
        render();
        return;
      }
      blockedMoveSources = new Set();
      addLog(`Ход переходит: ${getCountry(currentPlayer).name}.`);
      render();
      showPassOverlay();
    });

    startTurnBtn.addEventListener("click", hidePassOverlay);
    reinforcementTokenEl.addEventListener("mousedown", (event) => {
      if (!pendingReinforcement) return;
      reinforcementDrag = true;
      reinforcementTokenEl.classList.add("dragging");
      event.preventDefault();
    });
    document.addEventListener("mousemove", (event) => {
      if (!reinforcementDrag || !pendingReinforcement) return;
      placeReinforcementTokenFromClient(event.clientX, event.clientY);
    });
    document.addEventListener("mouseup", (event) => {
      if (!reinforcementDrag || !pendingReinforcement) return;
      reinforcementDrag = false;
      reinforcementTokenEl.classList.remove("dragging");
      const regionId = getRegionIdAtClientPoint(event.clientX, event.clientY);
      if (!regionId) {
        addLog("Подкрепление не размещено: бросьте маркер в регион вашей страны.");
        return;
      }
      const target = getRegion(regionId);
      if (!target || target.owner !== currentPlayer) {
        addLog("Подкрепление можно разместить только в ваш регион.");
        return;
      }
      target.army += pendingReinforcement.units;
      addLog(
        `${getCountry(currentPlayer).name}: подкрепление ${pendingReinforcement.units} юнитов добавлено в ${target.id}.`
      );
      pendingReinforcement = null;
      reinforcementTokenEl.style.display = "none";
      render();
    });
    document.getElementById("restartBtn").addEventListener("click", () => loadMap(activeMapId));
    document.getElementById("loadMapBtn").addEventListener("click", () => {
      const mapId = mapSelectEl.value;
      loadMap(mapId);
    });
    zoomRangeEl.addEventListener("input", () => {
      const nextScale = Number(zoomRangeEl.value) / 100;
      applyMapScale(nextScale);
    });

    initMapSelect();
    applyMapScale(1);
    loadMap(activeMapId);
  </script>
</body>
</html>
